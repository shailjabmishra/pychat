version: "3.8"

services:
  db:
    image: postgres:15
    container_name: pychat_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin 
      POSTGRES_DB: pychatdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d pychatdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
